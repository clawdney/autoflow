name: AutoFlow Scan

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to scan'
        required: true
        type: string
        default: 'https://example.com'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install playwright
      
      - name: Install Playwright browsers
        run: npx playwright install chromium
      
      - name: Run AutoFlow
        run: |
          URL="${{ github.event.inputs.url || 'https://example.com' }}"
          echo "Scanning: $URL"
          node autoflow.js "$URL"
      
      - name: Generate results HTML
        run: |
          URL="${{ github.event.inputs.url || 'https://example.com' }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          
          cat > results/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>AutoFlow Results</title>
            <style>
              body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
              .container { background: white; padding: 30px; border-radius: 12px; }
              h1 { color: #1a1a2e; }
              .page { background: #f0f0f0; padding: 16px; margin: 12px 0; border-radius: 8px; }
              .page-name { font-weight: bold; font-size: 18px; }
              .page-url { color: #666; word-break: break-all; }
              .elements { color: #4f46e5; font-size: 14px; margin-top: 8px; }
              .timestamp { color: #999; font-size: 12px; }
              a { color: #4f46e5; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🤖 AutoFlow Results</h1>
              <p class="timestamp">Last scan: $TIMESTAMP</p>
              <p><strong>URL:</strong> $URL</p>
              <h2>Discovered Pages</h2>
              PAGES_HTML
              <p><a href="../">← Back to AutoFlow</a></p>
            </div>
          </body>
          </html>
          EOF
          
          # Convert workflow.json to HTML
          if [ -f workflow.json ]; then
            python3 << 'PYEOF'
import json
with open('workflow.json') as f:
    data = json.load(f)

pages = data.get('pages', [])
if pages:
    html_parts = []
    for p in pages:
        els = p.get('elements', [])
        el_names = ', '.join([e['category'] for e in els]) if els else 'none'
        html_parts.append(f'''
        <div class="page">
          <div class="page-name">{p.get('name', 'Unknown')}</div>
          <div class="page-url">{p.get('url', '')}</div>
          <div class="elements">Elements: {el_names}</div>
        </div>''')
    pages_html = '\n'.join(html_parts)
else:
    pages_html = '<p>No pages found</p>'

with open('results/index.html') as f:
    content = f.read()

content = content.replace('PAGES_HTML', pages_html)
with open('results/index.html', 'w') as f:
    f.write(content)
PYEOF
          else
            sed -i 's/PAGES_HTML/<p>No workflow.json found<\/p>/' results/index.html
          fi
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./results
