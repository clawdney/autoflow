name: AutoFlow Scan

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to scan'
        required: true
        type: string
        default: 'https://brave.com'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install playwright
      
      - name: Install Playwright browsers
        run: npx playwright install chromium
      
      - name: Run AutoFlow
        run: |
          URL="${{ github.event.inputs.url || 'https://brave.com' }}"
          echo "Scanning: $URL"
          node autoflow.js "$URL"
      
      - name: Generate and deploy results
        run: |
          chmod +x generate-results.sh
          URL="${{ github.event.inputs.url || 'https://brave.com' }}"
          ./generate-results.sh "$URL"
          
          # Copy results to root for deployment
          cp results/index.html index.html
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
