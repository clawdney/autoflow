<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFlow - No-Code Browser Automation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 16px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #1a1a2e; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
        .btn { background: #4f46e5; color: white; border: none; padding: 14px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; display: block; text-align: center; text-decoration: none; transition: background 0.3s; }
        .btn:hover { background: #4338ca; }
        .note { background: #f0f0f0; padding: 12px; border-radius: 8px; font-size: 12px; color: #666; margin-bottom: 20px; }
        .link-box { background: #f5f5f5; padding: 16px; border-radius: 8px; margin-top: 20px; }
        .link-box a { color: #4f46e5; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AutoFlow</h1>
        <p class="subtitle">No-code browser automation</p>
        
        <div class="note">
            1. Click "Run Scan" → GitHub Actions<br>
            2. Wait ~30s for scan to complete<br>
            3. Click "View Results" to see output
        </div>
        
        <a class="btn" href="https://github.com/clawdney/autoflow/actions/workflows/scan.yml" target="_blank">
            ▶ Run Scan
        </a>
        
        <div class="link-box">
            <a href="https://clawdney.github.io/autoflow/results/" target="_blank">
                📄 View Last Results
            </a>
        </div>
    </div>
</body>
</html>
